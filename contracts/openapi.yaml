openapi: 3.1.0
info:
  title: PersonaMask Video Review API
  version: 0.1.0
  description: |
    Saved-video privacy review API with candidate inspection, diffusion character
    redaction, protected downloads, diagnostics, and QA report artifacts.
servers:
  - url: /
    description: Root server; paths retain the /api/v1 prefix.

tags:
  - name: health
  - name: diagnostics
  - name: presets
  - name: videos

paths:
  /api/v1/health:
    get:
      tags: [health]
      summary: Check API and GPU runtime health.
      operationId: getHealth
      responses:
        '200':
          description: Health payload
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/diagnostics/runtime:
    get:
      tags: [diagnostics]
      summary: Inspect runtime readiness, diffusion settings, and queue availability.
      operationId: getRuntimeDiagnostics
      responses:
        '200':
          description: Runtime diagnostics payload
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Trace-Latency-Ms:
              $ref: '#/components/headers/XTraceLatencyMs'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticsResponse'

  /api/v1/presets:
    get:
      tags: [presets]
      summary: List diffusion character style presets.
      operationId: listPresets
      responses:
        '200':
          description: Preset collection
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresetsResponse'

  /api/v1/videos/candidates:
    post:
      tags: [videos]
      summary: Upload a video and extract reviewable face candidates.
      operationId: createVideoCandidates
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Candidate analysis result
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCandidateAnalysisResponse'
        '400':
          $ref: '#/components/responses/ApiError'

  /api/v1/videos/candidates/{analysis_id}/{candidate_id}:
    get:
      tags: [videos]
      summary: Download a protected candidate face crop for review.
      operationId: downloadVideoCandidate
      parameters:
        - name: analysis_id
          in: path
          required: true
          schema:
            type: string
        - name: candidate_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XAccessToken'
        - $ref: '#/components/parameters/AccessToken'
      responses:
        '200':
          description: Candidate face image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'

  /api/v1/videos/jobs:
    post:
      tags: [videos]
      summary: Create an uploaded-video privacy review render job.
      operationId: createVideoJob
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, config]
              properties:
                file:
                  type: string
                  format: binary
                config:
                  type: string
                  description: JSON encoded video job config.
      responses:
        '200':
          description: Video job accepted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoJobCreateResponse'
        '400':
          $ref: '#/components/responses/ApiError'

  /api/v1/videos/jobs/{job_id}:
    get:
      tags: [videos]
      summary: Poll video job status.
      operationId: getVideoJob
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/XAccessToken'
        - $ref: '#/components/parameters/AccessToken'
      responses:
        '200':
          description: Video job status
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoJobStatusResponse'
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'

  /api/v1/videos/jobs/{job_id}/result:
    get:
      tags: [videos]
      summary: Download the completed video job result.
      operationId: downloadVideoJobResult
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/XAccessToken'
        - $ref: '#/components/parameters/AccessToken'
      responses:
        '200':
          description: Result video file
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'

  /api/v1/videos/jobs/{job_id}/thumbnail:
    get:
      tags: [videos]
      summary: Download the completed video job thumbnail.
      operationId: downloadVideoJobThumbnail
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/XAccessToken'
        - $ref: '#/components/parameters/AccessToken'
      responses:
        '200':
          description: Result thumbnail image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'

  /api/v1/videos/jobs/{job_id}/contact-sheet:
    get:
      tags: [videos]
      summary: Download before/after redaction contact sheet.
      operationId: downloadVideoJobContactSheet
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/XAccessToken'
        - $ref: '#/components/parameters/AccessToken'
      responses:
        '200':
          description: Before/after contact sheet image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'

  /api/v1/videos/jobs/{job_id}/qa-report.json:
    get:
      tags: [videos]
      summary: Download the machine-readable redaction QA report.
      operationId: downloadVideoJobQaReportJson
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/XAccessToken'
        - $ref: '#/components/parameters/AccessToken'
      responses:
        '200':
          description: Redaction QA report JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'

  /api/v1/videos/jobs/{job_id}/qa-report.md:
    get:
      tags: [videos]
      summary: Download the human-readable redaction QA report.
      operationId: downloadVideoJobQaReportMarkdown
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/XAccessToken'
        - $ref: '#/components/parameters/AccessToken'
      responses:
        '200':
          description: Redaction QA report Markdown
          content:
            text/markdown:
              schema:
                type: string
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'

  /api/v1/videos/jobs/{job_id}/cancel:
    post:
      tags: [videos]
      summary: Cancel a queued or processing video job.
      operationId: cancelVideoJob
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/XAccessToken'
        - $ref: '#/components/parameters/AccessToken'
      responses:
        '200':
          description: Video job cancel accepted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoJobCancelResponse'
        '403':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'

components:
  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
    AccessToken:
      name: access_token
      in: query
      required: false
      schema:
        type: string
    XAccessToken:
      name: X-Access-Token
      in: header
      required: false
      schema:
        type: string

  headers:
    XRequestId:
      description: Server-generated or propagated request id.
      schema:
        type: string
    XTraceLatencyMs:
      description: Optional processing latency metric in milliseconds.
      schema:
        type: number

  responses:
    ApiError:
      description: Standard API error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      required: [request_id, data, error]
      properties:
        request_id:
          type: string
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ErrorObject'

    HealthResponse:
      type: object
      required: [request_id, data, error]
      properties:
        request_id:
          type: string
        data:
          type: object
          additionalProperties: true
        error:
          type: 'null'

    DiagnosticsResponse:
      type: object
      required: [request_id, data, error]
      properties:
        request_id:
          type: string
        data:
          type: object
          additionalProperties: true
        error:
          type: 'null'

    PresetItem:
      type: object
      required: [preset_id, label, mode, thumbnail_url, engine]
      properties:
        preset_id:
          type: string
        label:
          type: string
        mode:
          type: string
          enum: [character]
        thumbnail_url:
          type: string
        engine:
          type: string
          enum: [diffusion_img2img]

    PresetsResponse:
      type: object
      required: [request_id, data, error]
      properties:
        request_id:
          type: string
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/PresetItem'
        error:
          type: 'null'

    PrivacyOptions:
      type: object
      required: [blur_faces, blur_plates, blur_text]
      properties:
        blur_faces:
          type: boolean
        blur_plates:
          type: boolean
        blur_text:
          type: boolean

    OutputOptions:
      type: object
      required: [container, video_codec, keep_audio]
      properties:
        container:
          type: string
          enum: [mp4]
        video_codec:
          type: string
          enum: [mp4v]
        keep_audio:
          type: boolean

    AllowedFaceReference:
      type: object
      required: [slot, image_data]
      properties:
        slot:
          type: string
          enum: [front, left45, right45, leftSide, rightSide]
        image_data:
          type: string
          minLength: 1
          maxLength: 6000000
          description: Base64 image data URL captured from the five-angle allowed-face enrollment UI.

    VideoJobConfig:
      type: object
      required: [mode, privacy_options, output_options]
      properties:
        mode:
          type: string
          enum: [video_privacy, blur, preserve, character]
        character_id:
          type:
            - string
            - 'null'
        analysis_id:
          type:
            - string
            - 'null'
        candidate_access_token:
          type:
            - string
            - 'null'
        candidate_actions:
          type: object
          additionalProperties:
            type: string
            enum: [preserve, character, blur, track]
        allowed_face_references:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/AllowedFaceReference'
        privacy_options:
          $ref: '#/components/schemas/PrivacyOptions'
        output_options:
          $ref: '#/components/schemas/OutputOptions'

    VideoFaceCandidate:
      type: object
      required: [candidate_id, image_url, frame_index, bbox, confidence]
      properties:
        candidate_id:
          type: string
        image_url:
          type: string
        frame_index:
          type: integer
        bbox:
          type: array
          minItems: 4
          maxItems: 4
          items:
            type: integer
        confidence:
          type: number

    VideoCandidateAnalysisResponse:
      type: object
      required: [request_id, data, error]
      properties:
        request_id:
          type: string
        data:
          type: object
          required: [analysis_id, access_token, source_filename, candidates]
          properties:
            analysis_id:
              type: string
            access_token:
              type: string
            source_filename:
              type: string
            candidates:
              type: array
              items:
                $ref: '#/components/schemas/VideoFaceCandidate'
        error:
          type: 'null'

    VideoJobCreateResponse:
      type: object
      required: [request_id, data, error]
      properties:
        request_id:
          type: string
        data:
          type: object
          required: [job_id, status, access_token, status_endpoint, cancel_endpoint]
          properties:
            job_id:
              type: string
            status:
              type: string
              enum: [queued]
            access_token:
              type: string
            status_endpoint:
              type: string
            cancel_endpoint:
              type: string
        error:
          type: 'null'

    JobProgress:
      type: object
      required: [percent, processed_frames, total_frames, eta_sec]
      properties:
        percent:
          type: integer
        processed_frames:
          type: integer
        total_frames:
          type: integer
        eta_sec:
          type: integer

    VideoQaSummary:
      type: object
      additionalProperties: true
      properties:
        processed_frames:
          type: integer
        detection_totals:
          type: object
          additionalProperties:
            type: integer
        average_blur_reduction_pct:
          type:
            - number
            - 'null'
        suspect_frame_count:
          type: integer
        candidate_enforcement:
          type: object
          additionalProperties: true
        character_style:
          type: object
          additionalProperties: true

    VideoJobResult:
      type: object
      required: [download_url, preview_thumbnail_url, expires_at]
      properties:
        download_url:
          type: string
        preview_thumbnail_url:
          type:
            - string
            - 'null'
        contact_sheet_url:
          type:
            - string
            - 'null'
        qa_report_json_url:
          type:
            - string
            - 'null'
        qa_report_markdown_url:
          type:
            - string
            - 'null'
        qa_summary:
          oneOf:
            - $ref: '#/components/schemas/VideoQaSummary'
            - type: 'null'
        expires_at:
          type:
            - string
            - 'null'
          format: date-time

    VideoJobStatusResponse:
      type: object
      required: [request_id, data, error]
      properties:
        request_id:
          type: string
        data:
          type: object
          required: [job_id, status, progress, result]
          properties:
            job_id:
              type: string
            status:
              type: string
              enum: [queued, processing, completed, failed, cancelled]
            progress:
              $ref: '#/components/schemas/JobProgress'
            result:
              oneOf:
                - $ref: '#/components/schemas/VideoJobResult'
                - type: 'null'
        error:
          type: 'null'

    VideoJobCancelResponse:
      type: object
      required: [request_id, data, error]
      properties:
        request_id:
          type: string
        data:
          type: object
          required: [job_id, status]
          properties:
            job_id:
              type: string
            status:
              type: string
              enum: [cancelled]
        error:
          type: 'null'
